cv:
  # Phone is intentionally omitted from git to reduce scraping/spam. To bake a
  # number into the PDF only, run: CV_PHONE="+1…" pnpm run cv:render
  # (E.164). Optional GitHub Actions secret CV_PHONE does the same in CI.
  #
  # --- Replace bracket placeholders before publishing (search for [N], [M], etc.) ---
  # Context Labs: [M]→[N] = UI/UX org size you managed (start → peak). GHG bullet cites
  #   public program detail (e.g. Williams NextGen Gas deck); no aggregate tCO2e on slide.
  # Filtered.ai: employer framing set (large employers, financial services + technology).
  # Turo: WSJ 2019 (IAC); gross revenue / geography from company-disclosed milestones (~2018).
  # Pre-2016 roles: each stint is its own experience entry (Say Media → … → GE Fanuc).
  name: David Marr
  headline: Engineering Leader | 25 Years Scaling Modern Software, Global Teams &
    AI Integration
  location: "Boston, MA"
  email: "dave.marr@gmail.com"
  sections:
    summary:
      - Engineering leader with 25 years shipping products at category-leading
        companies (e.g. Yahoo, Westfield Labs, Context Labs, Turo). Brings
        cross-functional leadership and systems at scale; applies AI in engineering
        workflows, observability, and platforms that accelerate delivery.
    experience:
      - company: "Context Labs"
        position: "Principal UI Engineer / Engineering Manager"
        start_date: 2022-06
        end_date: 2026-03
        location: "Cambridge, MA"
        summary: "Led a distributed UI/UX engineering organization to deliver a
          multi-tenant, production-grade analytics platform for energy and
          sustainability customers. Combined hands-on frontend development with
          people management, OKR-driven delivery, and platform-thinking to
          reduce time-to-market and improve product quality."
        highlights:
          - "Managed the UI/UX engineering organization, growing it from **3**
            to **10** engineers across three continents; introduced OKRs and
            regular reviews to increase velocity and accountability."
          - "Designed and launched Decarbonization-as-a-Service (DaaS) for
            **greenhouse gas (GHG) inventories in metric tonnes CO₂e**
            (CO₂-equivalent), with analytics and reporting for major global
            energy companies. **Supported programs including Williams NextGen
            Gas:** **QMRV** (quantification, monitoring, reporting, verification)
            across production through market, with multi-layer monitoring
            (e.g. satellite, aerial, fixed sensors, source-level measurement) and
            third-party emissions-intensity certification (KPMG)."
          - "Built a production platform integrating backend services,
            multi-tenancy, SSO authentication, RBAC, and internationalization;
            developed a shared UI component library with data visualizations,
            interactive maps, and accessible controls."
          - "Championed **AI tooling** in engineering workflows; improved CI/CD and
            observability for frontend deployments—lower MTTR and higher deploy
            frequency."
      - company: "Filtered.ai"
        position: "Lead Engineer"
        start_date: 2020-02
        end_date: 2022-02
        location: "Boston, MA"
        summary: "Architected scalable recruitment workflows for **large employers
          in financial services and technology** — high-volume applicant
          pipelines with AI-driven grading and fraud detection."
        highlights:
          - "Directed development of interview scheduling, candidate pipelines,
            assessment portals, and **live video interviews** for technical
            hiring at scale."
          - "Implemented AI-driven grading, automated feedback, and fraud detection;
            collaborated with product and data on models and metrics for candidate
            success and system effectiveness."
      - company: "Turo"
        position: "Staff Software Engineer"
        start_date: 2018-04
        end_date: "2019-12"
        location: "San Francisco, CA & Cambridge, MA"
        summary: "Owned host-facing product work while the marketplace scaled to
          **~$236M gross revenue** and **40+ countries** by 2018 (company metrics)
          and through **IAC’s $250M investment at a >$1B valuation, Jul 2019,
          WSJ**; shipped programs that lifted host engagement, revenue, and listing
          quality."
        highlights:
          - "Shipped **availability calendar**, **trip lifecycle management**, and
            **dynamic pricing** for **Turo’s full host base**—raising utilization
            and host-side revenue; partnered with analytics to quantify lift and
            iterate releases."
          - "Led the **All-star** host recognition program end-to-end, tying
            incentives to quality and retention metrics."
      - company: "OneMarket / Westfield Labs"
        position: "Senior Software Architect"
        start_date: "2016-01"
        end_date: 2018-05
        location: "San Francisco, CA & London, UK"
        summary: "Architected retail and parking for **OneMarket**, **Westfield
          Labs** spin-out—**omnichannel** retail at **~1.1B annual shopping
          visits** across **85+** Westfield centers worldwide; parent Westfield
          announced a carve-out toward an **ASX listing with ~US$198M cash** on
          the balance sheet (**Feb 2018, iTnews**), amid its proposed combination
          with **Unibail-Rodamco** (press: **world’s largest retail landlord**)."
        highlights:
          - "Delivered smart parking with facial recognition, subscription
            billing, and gate automation—reducing friction for high-traffic
            retail estates; parking and payment products on the order of
            **£2m/month** in recurring revenue."
          - "Built **interior mapping** tools so partners could verify leased
            space; shipped directory and wayfinding for **large-format malls and
            retail campuses**."
          - "Built account and operations tooling with **React**, **Node**, and
            **PostgreSQL**; integrated edge devices with cloud services for
            reliable shopper flows and centralized operations."
      - company: "Tilt.com"
        position: "Senior Systems Engineer"
        start_date: 2013-07
        end_date: 2015-12
        location: "San Francisco, CA"
        summary: "Optimized core user flows during **Y Combinator**–era growth
          (**Series A $12M**, Apr 2013; **Series B $23M**, Dec 2013)."
        highlights:
          - "Redesigned **first-party signup** and onboarding (**~15%** lift in
            conversions and revenue); advocated **React** for new product work."
          - "Improved reliability and scalability for surge traffic during
            fundraising campaigns and promotions."
      - company: "Say Media"
        position: "Senior Software Engineer"
        start_date: 2012-03
        end_date: 2013-04
        location: "San Francisco, CA"
        summary: "**Conversational media** publisher network (VideoEgg + Six Apart
          merger); **Ember.js** for content and monetization."
        highlights:
          - "Lifted **engaged time** via headlines, traffic modules, and in-article
            **user reactions**."
          - "**SheKnows** (network flagship): cited as the **fastest-growing women's
            lifestyle brand** in its category (**comScore**)."
      - company: "CBS Interactive"
        position: "Software Engineer (tv.com)"
        start_date: 2011-06
        end_date: 2011-12
        location: "San Francisco, CA"
        summary: "Show and metadata for **tv.com**: **SVG**-heavy web UI and **Python**
          APIs for shows and metadata."
      - company: "Secret Feature"
        position: "Technical Co-Founder / CTO"
        start_date: 2010-01
        end_date: 2011-05
        location: "San Francisco, CA"
        summary: "Co-founder; shipped an early social product on **Node.js** as the
          stack moved beyond Flash; contributed to **Diversion, Inc.** closing a
          **Series A**."
      - company: "Frog Design"
        position: "Design Technologist"
        start_date: 2009-01
        end_date: 2010-03
        location: "San Francisco, CA"
        summary: "Design-to-production and embedded work for physical products—**Disney**
          park data **API** and web for **MagicBand**; Flash-era prototypes and
          embedded hardware."
      - company: "Yahoo"
        position: "Senior Frontend Engineer"
        start_date: 2006-09
        end_date: 2008-12
        location: "Sunnyvale / San Francisco, CA"
        summary: "Scalable frontend for high-traffic properties: **PHP/MySQL** (Yahoo!
          Answers / Small Business); **Brickhouse** — **Yahoo! Live** live-streaming;
          **60+ min** average time-on-site; **~2M signups** in nine months."
      - company: "Monster.com"
        position: "Senior Web Developer"
        start_date: 2004-03
        end_date: 2006-08
        location: "Maynard, MA"
        summary: "User-facing work on a **Webby**-recognized career advice site;
          early **.NET**, migrated CMS from classic **ASP** to **ASP.NET**."
      - company: "SoftArtisans"
        position: "Web Applications Developer"
        start_date: 2003-03
        end_date: 2004-04
        location: "Brookline, MA"
        summary: "Enterprise **SAFileUp** and **multipart/form-data** uploads on
          **Microsoft** server stacks."
      - company: "GE Fanuc / Intellution"
        position: "Web Developer"
        start_date: 2000-01
        end_date: 2003-12
        location: "Foxborough, MA"
        summary: "Industrial automation web interfaces and dashboards: **CRM** apps
          (**SQL Server**, **IIS**, classic **ASP**) for plant and operations
          customers."
    education:
      - institution: "University of New Hampshire"
        area: "Management of Information Systems"
        degree: "BS, Business Administration"
        start_date: "1996-09"
        end_date: 2000-05
        location: "Durham, NH"
        summary: "Dean's List"
    skills:
      - label: "Languages"
        details: "JavaScript, TypeScript, Go, Python, HTML, CSS"
      - label: "Frameworks"
        details: "React, Svelte, Vue"
      - label: "Metaframeworks"
        details: "Next.js, Nuxt, SvelteKit, TanStack Start"
      - label: "Infrastructure & Tools"
        details: "Docker, Kubernetes, AWS, Google Cloud Platform, OpenAPI,
          PostgreSQL, MongoDB, Trino, ArcadeDB, OrientDB, Vite"
      - label: "Frontend & Visualization"
        details: "Tailwind, Tanstack, Vega Lite, Apache ECharts, WebGL, Mapbox,
          Maplibre, QGIS"
      - label: "AI"
        details: "AI SDKs, OpenAI, Claude, Codex, private LLM integrations"
  website: https://marr.github.io

design:
  theme: classic
  page:
    size: us-letter
    # Balanced for ~2-page PDF (between cramped and airy)
    top_margin: 0.52in
    bottom_margin: 0.52in
    left_margin: 0.52in
    right_margin: 0.52in
    show_footer: true
    show_top_note: false
  colors:
    body: rgb(0, 0, 0)
    name: rgb(0, 0, 0)
    headline: black
    connections: black
    section_titles: black
    links: black
    footer: rgb(128, 128, 128)
    top_note: rgb(128, 128, 128)
  typography:
    line_spacing: 0.53em
    alignment: left
    date_and_location_column_alignment: right
    font_family:
      body: Mukta
      name: Open Sans
      headline: Open Sans
      connections: Open Sans
      section_titles: Open Sans
    font_size:
      body: 9.5pt
      name: 27pt
      headline: 9.5pt
      connections: 9.5pt
      section_titles: 1.3em
    small_caps:
      name: false
      headline: false
      connections: false
      section_titles: false
    bold:
      name: true
      headline: false
      connections: false
      section_titles: true
  links:
    underline: false
    show_external_link_icon: false
  header:
    alignment: center
    photo_width: 3.5cm
    photo_position: left
    photo_space_left: 0.4cm
    photo_space_right: 0.4cm
    space_below_name: 0.5cm
    space_below_headline: 0.45cm
    space_below_connections: 0.45cm
    connections:
      phone_number_format: national
      hyperlink: true
      show_icons: true
      display_urls_instead_of_usernames: false
      separator: ""
      space_between_connections: 0.5cm
  section_titles:
    type: without_line
    line_thickness: 0.5pt
    space_above: 0.38cm
    space_below: 0.16cm
  sections:
    allow_page_break: true
    space_between_regular_entries: 0.95em
    space_between_text_based_entries: 0.24em
    show_time_spans_in: []
  entries:
    date_and_location_width: 4.15cm
    side_space: 0.2cm
    space_between_columns: 0.1cm
    allow_page_break: false
    short_second_row: true
    degree_width: 1cm
    summary:
      space_above: 0cm
      space_left: 0cm
    highlights:
      bullet: •
      nested_bullet: •
      space_left: 0.15cm
      space_above: 0cm
      space_between_items: 0cm
      space_between_bullet_and_text: 0.4em
  templates:
    footer: "*NAME -- PAGE_NUMBER/TOTAL_PAGES*"
    top_note: "*LAST_UPDATED CURRENT_DATE*"
    single_date: MONTH_ABBREVIATION YEAR
    date_range: START_DATE – END_DATE
    time_span: HOW_MANY_YEARS YEARS HOW_MANY_MONTHS MONTHS
    one_line_entry:
      main_column: "**LABEL:** DETAILS"
    # Degree in main column (no separate degree column): default 1cm degree column
    # truncates long lines like "BS, Business Administration" in the PDF.
    education_entry:
      main_column: |-
        **INSTITUTION**, AREA
        **DEGREE**
        SUMMARY
        HIGHLIGHTS
      degree_column: null
      date_and_location_column: |-
        LOCATION
        DATE
    normal_entry:
      main_column: |-
        **NAME**
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: |-
        LOCATION
        DATE
    experience_entry:
      main_column: |-
        **COMPANY**, POSITION
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: |-
        LOCATION
        DATE
    publication_entry:
      main_column: |-
        **TITLE**
        SUMMARY
        AUTHORS
        URL (JOURNAL)
      date_and_location_column: DATE
