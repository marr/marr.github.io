cv:
  # Voice: plain English first; say what a non-specialist would recognize. Keep a few
  # standard tech names for search. Avoid acronym stacks (BFF, RBAC, RAG, MTTR, etc.)
  # unless paired with a plain-English gloss. Resume clichés: spearheaded→led, etc.
  #
  # Phone is intentionally omitted from git to reduce scraping/spam. To bake a
  # number into the PDF only, run: CV_PHONE="+1…" pnpm run cv:render
  # (E.164). Optional GitHub Actions secret CV_PHONE does the same in CI.
  #
  # --- Replace bracket placeholders before publishing (search for [N], [M], etc.) ---
  # Context Labs: Principal UI Engineer → Eng Lead (UI) when reports; team 9; GenAI/RAG/evals, BFF, auth/ACL.
  # Filtered.ai: employer framing set (large employers, financial services + technology).
  # Turo: host-facing product; availability, pricing, All-star program.
  # Pre-2016 roles: each stint is its own experience entry (Say Media → … → GE Fanuc).
  name: David Marr
  headline: Principal Software Engineer | TypeScript & Modern Web | AI and
    Data Products
  location: "Boston, MA"
  email: "dave.marr@gmail.com"
  sections:
    summary:
      - "Twenty-five years of experience building demanding web products and the data behind them:
        marketplaces, business software, and energy and climate tools. Owning the path
        from browser through APIs and working closely with data and machine learning
        partners, allows me to stay hands on while also growing teams, raising quality, and shipping faster."
      - "My current focus is AI-assisted development: tools and custom automation that
        turn specs into shippable features with tight spec-and-build loops, allowing teams to spend more time on the
        product."
    experience:
      - company: "Context Labs"
        position: "Engineering Lead (UI)"
        start_date: 2022-06
        end_date: 2026-03
        location: "Cambridge, MA"
        summary:
          "Created and managed data software (Vue/Nuxt) for global energy and sustainability teams.
          Integrated graph database with ontological classification system to support OGMP reporting standards. Defined OKRs for engineering to keep teams
          aligned across the company."
        highlights:
          - "Managed nine engineers across three continents and mentored engineers and team leads."
          - "Developed pathway optimization tools for routing and delivery of NextGen energy products."
          - "Delivered multi-tenant enterprise features for customer organizations:
            single sign-on, role-based access, and localized UI in one codebase."
          - "Built a shared component library for visualization of complex charts, maps, and data using Vue, Tailwind, and Nuxt."
          - "Designed formal spec-driven delivery and iteration tools using AI and shell scripting."
          - "Utilized DORA metrics (MTTR) leading to faster incident recovery and more frequent deploys."
      - company: "Filtered.ai"
        position: "Lead Engineer"
        start_date: 2020-02
        end_date: 2022-02
        location: "Boston, MA"
        summary: "Hiring software for large employers in finance and tech. Owned scheduling, candidate flows, assessment sites, and live video interviews for technical hiring at scale."
        highlights:
          - "Built automatic scoring, instant candidate feedback, and fraud
            detection for technical assessment platform."
          - "Used site data and product metrics to identify and fix bottlenecks in candidate experience, improving
            completion rates and time to hire."
      - company: "Turo"
        position: "Staff Software Engineer"
        start_date: 2018-04
        end_date: "2019-12"
        location: "San Francisco, CA & Cambridge, MA"
        summary:
          "Owned work that helped hosts stay active, keep listings in good shape,
          and earn more; worked with analytics to see what moved the numbers and what
          to ship next."
        highlights:
          - "Shipped availability calendar, trip lifecycle management, and dynamic
            pricing for the full host base, raising utilization and host-side revenue;
            partnered with analytics to quantify lift and iterate releases."
          - "Ran the All-star host program end to end, linking rewards to quality
            and host retention."
      - company: "OneMarket / Westfield Labs"
        position: "Senior Software Architect"
        start_date: "2016-01"
        end_date: 2018-05
        location: "San Francisco, CA & London, UK"
        summary: "Built omnichannel software for retailers including parking, payments, and finding your way inside busy shopping centers."
        highlights:
          - "Designed smart parking product which included subscription based payments and automated entry using facial recognition at the gate."
          - "Crafted indoor maps and turn-by-turn directions using beacons in malls
            for partners to confirm store footprints."
          - "Designed APIs and customer facing apps for Westfield locations
            worldwide using React, Node.js, and PostgreSQL."
      - company: "Tilt.com"
        position: "Senior Systems Engineer"
        start_date: 2013-07
        end_date: 2015-12
        location: "San Francisco, CA"
        summary:
          "Responsible for signup and core product flows. Focused on conversion, uptime, and handling spikes
          when demand peaked. Redesigned signup and onboarding flows (~15% lift in conversions and revenue)."
      - company: "Say Media (formerly VideoEgg)"
        position: "Senior Software Engineer"
        start_date: 2012-03
        end_date: 2013-04
        location: "San Francisco, CA"
        summary:
          "Improved engaged time across sites through features like in-article user reactions, editorial
          tooling, and modules for recirculation and related content."
      - company: "CBS Interactive"
        position: "Senior Front End Web Developer"
        start_date: 2011-06
        end_date: 2011-12
        location: "San Francisco, CA"
        summary:
          "Built features for tv.com with Python and JavaScript; A/B tested
          variants on core flows to improve engagement and conversion."
      - company: "Secret Feature"
        position: "Technical Co-Founder / CTO"
        start_date: 2010-01
        end_date: 2011-05
        location: "San Francisco, CA"
        summary: "Developed creative social media applications using JavaScript and Python; built a team and raised funding to launch products."
      - company: "Frog Design"
        position: "Design Technologist"
        start_date: 2009-01
        end_date: 2010-03
        location: "San Francisco, CA"
        summary: "Built web application for MagicBand wristband at Disney World. Integrated cellular video into portable hardware device. Developed software prototypes for mobile devices."
      - company: "Yahoo"
        position: "Senior Frontend Engineer"
        start_date: 2006-09
        end_date: 2008-12
        location: "Sunnyvale / San Francisco, CA"
        summary:
          "Built Yahoo! Answers integration for the high traffic Small Business product using PHP and MySQL.
          Shipped Yahoo! Live live streaming at Brickhouse, reaching 60+ minute average time on site and ~2M signups in nine months."
      - company: "Monster.com"
        position: "Senior Web Developer"
        start_date: 2004-03
        end_date: 2006-08
        location: "Maynard, MA"
        summary:
          "Built and maintained Webby-recognized careers.monster.com; worked with editorial
          and content teams to design and implement features for career advice and job search."
      - company: "SoftArtisans"
        position: "Web Applications Developer"
        start_date: 2003-03
        end_date: 2004-04
        location: "Brookline, MA"
        summary: "Developed enterprise file upload software (SAFileUp) using Microsoft technologies."
      - company: "GE Fanuc / Intellution"
        position: "Web Developer"
        start_date: 2000-09
        end_date: 2003-02
        location: "Foxborough, MA"
        summary: "Built web interfaces for industrial automation and control system software using SQL Server, classic ASP, and IIS."
    education:
      - institution: "University of New Hampshire"
        area: "Management of Information Systems"
        degree: "BS, Business Administration"
        start_date: "1996-09"
        end_date: 2000-05
        summary: "Focus: Management of Information Systems. Dean's List."
    skills:
      - label: "Languages"
        details: "JavaScript, TypeScript, Go, Python, HTML, CSS"
      - label: "Infrastructure & data"
        details: "Docker, Kubernetes, Amazon Web Services, Google Cloud Platform, OpenAPI, PostgreSQL, MongoDB, Trino, ArcadeDB, OrientDB, GraphQL"
      - label: "Frameworks & libraries"
        details: "Vue, React, Tailwind, TanStack, Vega Lite, WebGL, Mapbox,
          Maplibre, Deck.gl, Nuxt, Vite, Vitest"
      - label: "AI"
        details: "Azure AI Foundry, OpenAI, Anthropic Claude, Google Gemini, RAG, LangChain, MCP"
  website: https://marr.github.io

locale:
  language: english
  phrases:
    degree_with_area: "DEGREE"

design:
  theme: moderncv
  # Balance: readable spacing while staying near two pages; check PDF if copy changes.
  page:
    size: us-letter
    top_margin: 0.58in
    bottom_margin: 0.58in
    left_margin: 0.6in
    right_margin: 0.6in
    show_footer: true
    show_top_note: false
  colors:
    body: rgb(0, 0, 0)
    name: rgb(0, 0, 0)
    headline: rgb(0, 0, 0)
    connections: rgb(0, 0, 0)
    section_titles: rgb(0, 0, 0)
    links: rgb(0, 0, 0)
    footer: rgb(0, 0, 0)
    top_note: rgb(0, 0, 0)
  typography:
    line_spacing: 0.54em
    alignment: justified
    date_and_location_column_alignment: right
    font_family:
      body: Raleway
      name: Raleway
      headline: Raleway
      connections: Raleway
      section_titles: Raleway
    font_size:
      body: 9.5pt
      name: 24pt
      headline: 9.5pt
      connections: 9.5pt
      section_titles: 1.32em
    small_caps:
      name: false
      headline: false
      connections: false
      section_titles: false
    bold:
      name: false
      headline: false
      connections: false
      section_titles: false
  links:
    underline: true
    show_external_link_icon: false
  header:
    alignment: left
    photo_width: 4.15cm
    photo_position: left
    photo_space_left: 0cm
    photo_space_right: 0.3cm
    space_below_name: 0.58cm
    space_below_headline: 0.52cm
    space_below_connections: 0.52cm
    connections:
      phone_number_format: national
      hyperlink: true
      show_icons: true
      display_urls_instead_of_usernames: false
      separator: ""
      space_between_connections: 0.5cm
  section_titles:
    type: moderncv
    line_thickness: 0.15cm
    space_above: 0.46cm
    space_below: 0.24cm
  sections:
    allow_page_break: true
    space_between_regular_entries: 0.98em
    space_between_text_based_entries: 0.26em
    show_time_spans_in: []
  entries:
    date_and_location_width: 3.9cm
    side_space: 0cm
    space_between_columns: 0.26cm
    allow_page_break: false
    short_second_row: false
    degree_width: 1cm
    summary:
      space_above: 0.1cm
      space_left: 0cm
    highlights:
      bullet: •
      nested_bullet: •
      space_left: 0cm
      space_above: 0.12cm
      space_between_items: 0.09cm
      space_between_bullet_and_text: 0.3em
  templates:
    footer: "*NAME -- PAGE_NUMBER/TOTAL_PAGES*"
    top_note: "*LAST_UPDATED CURRENT_DATE*"
    single_date: MONTH_ABBREVIATION YEAR
    date_range: START_DATE – END_DATE
    time_span: HOW_MANY_YEARS YEARS HOW_MANY_MONTHS MONTHS
    one_line_entry:
      main_column: "**LABEL:** DETAILS"
    education_entry:
      main_column: |-
        **INSTITUTION**
        DEGREE_WITH_AREA -- LOCATION
        SUMMARY
        HIGHLIGHTS
      degree_column:
      date_and_location_column: DATE
    normal_entry:
      main_column: |-
        **NAME** -- **LOCATION**
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: DATE
    experience_entry:
      main_column: |-
        **POSITION**, COMPANY -- LOCATION
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: DATE
    publication_entry:
      main_column: |-
        **TITLE**
        SUMMARY
        AUTHORS
        URL (JOURNAL)
      date_and_location_column: DATE
