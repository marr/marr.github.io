cv:
  # Phone is intentionally omitted from git to reduce scraping/spam. To bake a
  # number into the PDF only, run: CV_PHONE="+1…" pnpm run cv:render
  # (E.164). Optional GitHub Actions secret CV_PHONE does the same in CI.
  name: David Marr
  headline: Engineering Leader | 25 Years Scaling Modern Software, Global Teams &
    AI Integration
  location: "Boston, MA"
  email: "dave.marr@gmail.com"
  sections:
    summary:
      - Engineering leader with 25 years building production software in
        startups and enterprises. I lead cross-functional teams, scale systems,
        and ship reliable, user-focused products. I integrate AI into workflows,
        improve performance and observability, and build developer platforms
        that speed delivery.
    experience:
      - company: "Context Labs"
        position: "Principal UI Engineer / Engineering Manager"
        start_date: 2022-06
        end_date: 2026-03
        location: "Boston, MA"
        summary: "Led a distributed UI/UX engineering organization to deliver a
          multi-tenant, production-grade analytics platform for energy and
          sustainability customers. Combined hands-on frontend development with
          people management, OKR-driven delivery, and platform-thinking to
          reduce time-to-market and improve product quality."
        highlights:
          - Managed and grew a team of UI/UX engineers across three continents;
            introduced OKRs and regular reviews to increase velocity and
            accountability.
          - Designed and launched Decarbonization-as-a-Service (DaaS) for
            tracking greenhouse gas emissions, providing analytics and reporting
            for major global energy companies.
          - Built a production platform integrating backend services,
            multi-tenancy, SSO authentication, RBAC, and internationalization.
          - Developed a shared UI component library with data visualizations,
            interactive maps, and accessible controls to ensure consistency and
            speed across products.
          - Improved CI/CD pipelines and observability for frontend deployments,
            reducing mean time to recovery and increasing deployment frequency.
      - company: "Filtered.ai"
        position: "Lead Engineer"
        start_date: 2020-02
        end_date: 2022-02
        location: "Boston, MA"
        summary: Architected scalable recruitment workflows for enterprise employers
          managing high-volume applicant pipelines, leveraging AI for automated
          grading and fraud detection.
        highlights:
          - "Directed development of recruitment workflows including interview
            scheduling, candidate pipelines, and assessment portals for
            enterprise customers."
          - "Implemented AI-driven grading, automated feedback, and
            fraud-detection systems to scale technical evaluations while
            maintaining integrity."
          - "Collaborated with product and data teams to iterate on models and
            metrics that measured candidate success and system effectiveness."
      - company: "Turo"
        position: "Staff Software Engineer"
        start_date: 2018-04
        end_date: "2019-12"
        location: "San Francisco, CA & Boston, MA"
        summary: "Owned host-facing product features that increased host engagement and
          revenue; worked cross-functionally to define programs that rewarded
          high-performing users."
        highlights:
          - "Built host product features such as calendar availability, trip
            management, and dynamic pricing controls to improve host experience
            and utilization."
          - "Led the 'All-star' program initiative to recognize and incentivize
            top hosts, contributing to retention and higher-quality listings."
          - "Partnered with analytics to measure feature impact and iterate
            based on host behavior and revenue metrics."
      - company: "OneMarket / Westfield Labs"
        position: "Senior Software Architect"
        start_date: "2016-01"
        end_date: 2018-05
        location: "San Francisco, CA"
        summary: "Designed and implemented intelligent retail and parking solutions that
          combined computer vision, mapping, and payment systems to improve
          customer experience and operations."
        highlights:
          - "Developed smart parking solutions leveraging facial recognition,
            subscription billing, and automated gates to streamline access and
            payments."
          - "Built indoor mapping, directory kiosks, and wayfinding systems to
            enhance navigation in complex retail environments."
          - "Integrated edge devices with cloud services for reliable,
            low-latency user interactions and centralized management."
      - company: "Tilt.com"
        position: "Senior Systems Engineer"
        start_date: 2013-07
        end_date: 2015-12
        location: "San Francisco, CA"
        summary: "Optimized core user flows and backend systems to increase conversion
          and streamline operations during high-growth phases."
        highlights:
          - "Redesigned and optimized the user signup and onboarding flow,
            yielding a measurable 15% increase in revenue."
          - "Improved system reliability and scalability to support surge
            traffic during fundraising campaigns and promotions."
      - company: "Earlier roles (2000–2013)"
        position: "Web Developer → Senior Engineer / Design Technologist / Technical
          Co-Founder"
        start_date: 2000-09
        end_date: 2013-04
        location: "Massachusetts & California"
        summary: "Industrial automation web interfaces and dashboards (GE Fanuc /
          Intellution); enterprise web integrations (SoftArtisans); user-facing
          features and a Webby-recognized career advice site (Monster.com);
          scalable frontend architecture for high-traffic Yahoo properties;
          design-to-production prototyping (Frog Design); co-founder/CTO for an
          early social product (Secret Feature); publishing and ad-tech at Say
          Media."
    education:
      - institution: "University of New Hampshire"
        area: "Management of Information Systems"
        degree: "BS"
        start_date: "1996-09"
        end_date: 2000-05
        location: "Durham, NH"
    skills:
      - label: "Languages"
        details: "JavaScript, TypeScript, Go, Python, HTML, CSS"
      - label: "Frameworks"
        details: "React, Svelte, Vue"
      - label: "Metaframeworks"
        details: "Next.js, Nuxt, SvelteKit, TanStack Start"
      - label: "Infrastructure & Tools"
        details: "Docker, Kubernetes, AWS, PostgreSQL, MongoDB, Trino, ArcadeDB,
          OrientDB, Vite"
      - label: "Frontend & Visualization"
        details: "Tailwind, Tanstack, Vega Lite, Apache ECharts, Mapbox, Maplibre, QGIS"
      - label: "AI"
        details: "AI SDKs, OpenAI, Claude, Codex, private LLM integrations"
  website: https://marr.github.io

design:
  theme: classic
  page:
    size: us-letter
    top_margin: 0.7in
    bottom_margin: 0.7in
    left_margin: 0.7in
    right_margin: 0.7in
    show_footer: true
    show_top_note: true
  colors:
    body: rgb(0, 0, 0)
    name: rgb(0, 0, 0)
    headline: black
    connections: black
    section_titles: black
    links: black
    footer: rgb(128, 128, 128)
    top_note: rgb(128, 128, 128)
  typography:
    line_spacing: 0.6em
    alignment: left
    date_and_location_column_alignment: right
    font_family:
      body: Mukta
      name: Open Sans
      headline: Open Sans
      connections: Open Sans
      section_titles: Open Sans
    font_size:
      body: 10pt
      name: 30pt
      headline: 10pt
      connections: 10pt
      section_titles: 1.4em
    small_caps:
      name: false
      headline: false
      connections: false
      section_titles: false
    bold:
      name: true
      headline: false
      connections: false
      section_titles: true
  links:
    underline: false
    show_external_link_icon: false
  header:
    alignment: center
    photo_width: 3.5cm
    photo_position: left
    photo_space_left: 0.4cm
    photo_space_right: 0.4cm
    space_below_name: 0.7cm
    space_below_headline: 0.7cm
    space_below_connections: 0.7cm
    connections:
      phone_number_format: national
      hyperlink: true
      show_icons: true
      display_urls_instead_of_usernames: false
      separator: ""
      space_between_connections: 0.5cm
  section_titles:
    type: without_line
    line_thickness: 0.5pt
    space_above: 0.5cm
    space_below: 0.3cm
  sections:
    allow_page_break: true
    space_between_regular_entries: 1.2em
    space_between_text_based_entries: 0.3em
    show_time_spans_in: []
  entries:
    date_and_location_width: 4.15cm
    side_space: 0.2cm
    space_between_columns: 0.1cm
    allow_page_break: false
    short_second_row: true
    degree_width: 1cm
    summary:
      space_above: 0cm
      space_left: 0cm
    highlights:
      bullet: •
      nested_bullet: •
      space_left: 0.15cm
      space_above: 0cm
      space_between_items: 0cm
      space_between_bullet_and_text: 0.5em
  templates:
    footer: "*NAME -- PAGE_NUMBER/TOTAL_PAGES*"
    top_note: "*LAST_UPDATED CURRENT_DATE*"
    single_date: MONTH_ABBREVIATION YEAR
    date_range: START_DATE – END_DATE
    time_span: HOW_MANY_YEARS YEARS HOW_MANY_MONTHS MONTHS
    one_line_entry:
      main_column: "**LABEL:** DETAILS"
    education_entry:
      main_column: |-
        **INSTITUTION**, AREA
        SUMMARY
        HIGHLIGHTS
      degree_column: "**DEGREE**"
      date_and_location_column: |-
        LOCATION
        DATE
    normal_entry:
      main_column: |-
        **NAME**
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: |-
        LOCATION
        DATE
    experience_entry:
      main_column: |-
        **COMPANY**, POSITION
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: |-
        LOCATION
        DATE
    publication_entry:
      main_column: |-
        **TITLE**
        SUMMARY
        AUTHORS
        URL (JOURNAL)
      date_and_location_column: DATE
