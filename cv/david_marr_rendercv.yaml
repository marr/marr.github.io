cv:
  # Voice: plain English first; say what a non-specialist would recognize. Keep a few
  # standard tech names for search. Avoid acronym stacks (BFF, RBAC, RAG, MTTR, etc.)
  # unless paired with a plain-English gloss. Resume clichés: spearheaded→led, etc.
  #
  # Phone is intentionally omitted from git to reduce scraping/spam. To bake a
  # number into the PDF only, run: CV_PHONE="+1…" pnpm run cv:render
  # (E.164). Optional GitHub Actions secret CV_PHONE does the same in CI.
  #
  # --- Replace bracket placeholders before publishing (search for [N], [M], etc.) ---
  # Context Labs: Principal UI Engineer → Eng Lead (UI) when reports; team 9; GenAI/RAG/evals, BFF, auth/ACL.
  # Filtered.ai: employer framing set (large employers, financial services + technology).
  # Turo: availability, pricing, All-star; host platform React tooling.
  # Experience list starts at Tilt.com; earlier roles omitted from résumé.
  name: David Marr
  headline: 25 Years Scaling Modern Software, Global Teams & AI Integration
  location: "Boston, MA"
  email: "dave.marr@gmail.com"
  sections:
    summary:
      - Engineering leader with 25 years building production software.
        Expertise in TypeScript, NodeJS, React, Vue, and AI-assisted development.
        Passionate about delivering enjoyable experiences and leading teams to
        faster, higher-quality delivery.
    experience:
      - company: "Context Labs"
        position: "Engineering Manager"
        start_date: 2025-09
        end_date: 2026-03
        location: "Cambridge, MA"
        summary: "Led distributed UI/UX engineering organization delivering
          multi-tenant analytics platform using Nuxt and Vue."
        highlights:
          - Managed and grew UI/UX team across three continents; introduced
            OKRs and reviews improving velocity and reducing MTTR by 50%.
          - Drove adoption of AI coding assistants and MCP extensions in Nuxt
            stack, pairing workshops with review and testing guardrails.
      - company: "Context Labs"
        position: "Principal Software Engineer"
        start_date: 2022-06
        end_date: 2025-09
        location: "Cambridge, MA"
        summary: "Led technical delivery of a multi-tenant, production-grade
          analytics platform using Nuxt and Vue; established engineering
          practices to reduce time-to-market and improve product quality."
        highlights:
          - Built production BFF platform with GraphQL/Java, multi-tenancy, SSO,
            RBAC, and internationalization using Nuxt and Nitro.
          - Developed shared UI component library with Vega Lite, MapBox, and
            accessible controls (TypeScript/Vue).

      - company: "Filtered.ai"
        position: "Lead Engineer"
        start_date: 2020-02
        end_date: 2022-02
        location: "Boston, MA"
        summary: Engineered the scalable SaaS platform for employers managing
          high-volume technical hiring processes with AI-driven grading,
          fraud detection, and React/TypeScript/Node.js tech stack.
        highlights:
          - "Directed recruitment workflows (interview scheduling, candidate
            pipelines, assessments) using React, TypeScript, and Node.js."
          - "Shipped features informed by funnel analytics that improved
            time-to-hire conversion metrics."
      - company: "Turo"
        position: "Lead / Staff Software Engineer"
        start_date: 2018-04
        end_date: "2019-12"
        location: "Cambridge, MA"
        summary: "Promoted from Staff to Lead (Apr 2019) to drive customer-facing
          features for host engagement and revenue. Leveraged React and Redux;
          added error management with stack traces; integrated in-car hardware."
        highlights:
          - "Owned trip management tools with dynamic pricing, improving host
            experience and utilization."
          - "Shipped All-star host program updates to recognize and incentivize
            top hosts, supporting retention and higher-quality listings."
      - company: "OneMarket / Westfield Labs"
        position: "Senior Software Architect"
        start_date: "2016-01"
        end_date: 2018-05
        location: "San Francisco, CA"
        summary:
          "Architected physical and online payment products, producing £2m
          per-month of income. Led customer management tools using JavaScript
          and React. Resided in London for flagship shopping center project."
        highlights:
          - "Developed smart parking with facial recognition, subscription
            billing, and automated gates using React and Stripe APIs."
          - "Built indoor mapping, directory kiosks, and wayfinding systems
            with Mapbox, Node.js, and C."
      - company: "Tilt.com"
        position: "Senior Systems Engineer"
        start_date: 2013-07
        end_date: 2015-12
        location: "San Francisco, CA"
        summary:
          "Optimized core user flows and backend systems to increase conversion
          and streamline operations. Simplified contribution flow yielding 15%
          lift in signups; engineered early React SSR with Perl/JavaScript."
        highlights: []
      - company: Frog Design
        position: Design Technologist
        start_date: 2009-01
        end_date: 2010-03
        location: San Francisco/Orlando/Austin
        summary: "Engineered digital and physical technical innovations including:"
        highlights:
          - MagicBand wristband at Disney World onsite in Orlando, FL.
          - Cellular television at Qualcomm campus in Austin, TX.
          - Smartphone UI for AT&T/Facebook prototype in San Francisco, CA.
      - company: Various
        position: Previous Leadership & Technical Roles
        start_date: 2000-09
        end_date: 2013-04
        location: "Massachusetts & California"
        summary:
          "Industrial automation web interfaces and dashboards (GE Fanuc / Intellution); enterprise web integrations (SoftArtisans); user-facing features and a Webby-recognized career advice site (Monster.com); scalable frontend architecture for high-traffic Yahoo properties; design-to-production prototyping (Frog Design); co-founder/CTO for an early social product (Secret Feature); publishing and ad-tech at Say Media."
        date: 2000-2013
    education:
      - institution: "University of New Hampshire"
        area: "Business Administration"
        degree: "BS"

        start_date: "1996-09"
        end_date: 2000-05
        location: "Durham, NH"
        summary: Focus on Management of Information Systems (MIS)
    skills:
      - label: Languages/Frameworks/Web
        details:
          TypeScript, JavaScript, Python, Go, React, Vue, HTML, CSS, Tailwind,
          Nuxt, Tanstack Start, Vega Lite, Mapbox, D3, Zod, React Hook Form,
          Vee-Validate, WebGL, WebGPU, WebRTC
      - label: AI Tools/Infrastructure
        details: Kubernetes, AWS, PostgreSQL, Docker, Git, MongoDB, Bash, Trino,
          ArcadeDB, Vite, Vitest, Vercel AI SDK, Pi, Cursor, Opencode,
          Cloudflare Workers, Cloudflare Durable Objects, Agent Skills,
          Turborepo, Lerna/NX
  website: https://marr.github.io
  photo:
  social_networks:
    - network: GitHub
      username: marr
    - network: LinkedIn
      username: davidmarr
    - network: X
      username: dmarr

locale:
  language: english
  phrases:
    degree_with_area: "DEGREE"

design:
  theme: moderncv
  page:
    size: us-letter
    top_margin: 0.7in
    bottom_margin: 0.7in
    left_margin: 0.7in
    right_margin: 0.7in
    show_footer: true
    show_top_note: true
  colors:
    body: rgb(0, 0, 0)
    name: rgb(0, 79, 144)
    headline: rgb(0, 79, 144)
    connections: rgb(0, 79, 144)
    section_titles: rgb(0, 79, 144)
    links: rgb(0, 79, 144)
    footer: rgb(128, 128, 128)
    top_note: rgb(128, 128, 128)
  typography:
    line_spacing: 0.6em
    alignment: justified
    date_and_location_column_alignment: right
    font_family:
      body: Fontin
      name: Fontin
      headline: Fontin
      connections: Fontin
      section_titles: Fontin
    font_size:
      body: 10pt
      name: 25pt
      headline: 10pt
      connections: 10pt
      section_titles: 1.4em
    small_caps:
      name: false
      headline: false
      connections: false
      section_titles: false
    bold:
      name: false
      headline: false
      connections: false
      section_titles: false
  links:
    underline: true
    show_external_link_icon: false
  header:
    alignment: left
    photo_width: 4.15cm
    photo_position: left
    photo_space_left: 0cm
    photo_space_right: 0.3cm
    space_below_name: 0.7cm
    space_below_headline: 0.7cm
    space_below_connections: 0.7cm
    connections:
      phone_number_format: E164
      hyperlink: false
      show_icons: true
      display_urls_instead_of_usernames: false
      separator: ""
      space_between_connections: 0.33cm
  section_titles:
    type: moderncv
    line_thickness: 0.15cm
    space_above: 0.55cm
    space_below: 0.3cm
  sections:
    allow_page_break: true
    space_between_regular_entries: 1.2em
    space_between_text_based_entries: 0.3em
    show_time_spans_in: []
  entries:
    date_and_location_width: 4.15cm
    side_space: 0cm
    space_between_columns: 0.3cm
    allow_page_break: false
    short_second_row: false
    degree_width: 1cm
    summary:
      space_above: 0.1cm
      space_left: 0cm
    highlights:
      bullet: •
      nested_bullet: •
      space_left: 0cm
      space_above: 0.15cm
      space_between_items: 0.1cm
      space_between_bullet_and_text: 0.3em
  templates:
    footer: "*NAME -- PAGE_NUMBER/TOTAL_PAGES*"
    top_note: "*LAST_UPDATED CURRENT_DATE*"
    single_date: MONTH_ABBREVIATION YEAR
    date_range: START_DATE – END_DATE
    time_span: HOW_MANY_YEARS YEARS HOW_MANY_MONTHS MONTHS
    one_line_entry:
      main_column: "**LABEL:** DETAILS"
    education_entry:
      main_column: |-
        **INSTITUTION**, DEGREE_WITH_AREA -- LOCATION
        SUMMARY
        HIGHLIGHTS
      degree_column:
      date_and_location_column: DATE
    normal_entry:
      main_column: |-
        **NAME** -- **LOCATION**
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: DATE
    experience_entry:
      main_column: |-
        **POSITION**, COMPANY -- LOCATION
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: DATE
    publication_entry:
      main_column: |-
        **TITLE**
        SUMMARY
        AUTHORS
        URL (JOURNAL)
      date_and_location_column: DATE
